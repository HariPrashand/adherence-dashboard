<!DOCTYPE html>
<html>
<head>
  <title>Adherence Analytics Dashboard</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI";
      background: #f5f7fb;
      color: #1e293b;
    }

    h1 {
      text-align: center;
      margin: 20px;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      border-radius: 6px;
      background: white;
      border: 1px solid #cbd5e1;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 0 20px;
    }

    .kpi {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    canvas {
      height: 320px !important;
    }
  </style>
</head>

<body>

<h1>Adherence Analytics Dashboard</h1>

<!-- Filters -->
<div class="filters">
  <select id="diseaseFilter"><option value="All">All Diseases</option></select>
  <select id="genderFilter"><option value="All">All Genders</option></select>
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi"><h3>Total Records</h3><p id="total"></p></div>
  <div class="kpi"><h3>Adherence %</h3><p id="adh"></p></div>
  <div class="kpi"><h3>Avg Delay</h3><p id="delay"></p></div>
</div>

<!-- Charts -->
<div class="dashboard">
  <div class="card"><canvas id="disease"></canvas></div>
  <div class="card"><canvas id="trial"></canvas></div>
  <div class="card"><canvas id="gender"></canvas></div>
  <div class="card"><canvas id="scatter"></canvas></div>
  <div class="card"><canvas id="adherence"></canvas></div>
  <div class="card"><canvas id="topDisease"></canvas></div>
</div>

<script>
let data = [];
let charts = {};

Chart.register(ChartDataLabels);

// LOAD CSV
Papa.parse("Data_Adherence_.csv", {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: res => {
    data = res.data.map(d => ({
      Disease: d.Disease?.trim(),
      Gender: d.Gender?.trim(),
      Adherence: d.Adherence?.trim().toLowerCase(),
      TherapeuticArea: d.TherapeuticArea?.trim(),
      Trial: +d.TrialLengthWeeks || 0,
      Delay: +d.DoseDelayHours || 0,
      Income: +d.MedianIncome || 0,
      Hosp: +d.HospitalizationPriorYear || 0
    }));

    initFilters();
    update();
  }
});

// FILTERS
function initFilters() {
  const diseases = [...new Set(data.map(d => d.Disease).filter(Boolean))];
  const genders = [...new Set(data.map(d => d.Gender).filter(Boolean))];

  diseases.forEach(d => diseaseFilter.innerHTML += `<option>${d}</option>`);
  genders.forEach(g => genderFilter.innerHTML += `<option>${g}</option>`);

  diseaseFilter.onchange = update;
  genderFilter.onchange = update;
}

// FILTER DATA
function filtered() {
  return data.filter(d =>
    (diseaseFilter.value === "All" || d.Disease === diseaseFilter.value) &&
    (genderFilter.value === "All" || d.Gender === genderFilter.value)
  );
}

// UPDATE
function update() {
  const d = filtered();
  if (!d.length) return;

  const totalCount = d.length;
  const adherentCount = d.filter(x => x.Adherence === "adherent").length;

  total.innerText = totalCount;
  adh.innerText = ((adherentCount / totalCount) * 100).toFixed(1) + "%";
  delay.innerText = (d.reduce((a,b)=>a+b.Delay,0)/totalCount).toFixed(2) + " hrs";

  drawBar("disease", groupCount(d,"Disease"), false, "Patients by Disease");
  drawBar("trial", groupAvg(d,"TherapeuticArea","Trial"), false, "Avg Trial Length (Weeks)");
  drawPie("gender", groupCount(d,"Gender"), "Gender Distribution");
  drawScatter("scatter", d);
  drawPie("adherence", groupCount(d,"Adherence"), "Adherence Split");
  drawBar("topDisease", topN(groupCount(d,"Disease"),5), true, "Top 5 Diseases");
}

// HELPERS
function groupCount(arr,key){
  const m={};
  arr.forEach(x=>{ if(x[key]) m[x[key]]=(m[x[key]]||0)+1; });
  return m;
}

function groupAvg(arr,key,val){
  const m={};
  arr.forEach(x=>{
    if(!x[key]) return;
    m[x[key]] = m[x[key]] || {s:0,c:0};
    m[x[key]].s += x[val];
    m[x[key]].c++;
  });
  Object.keys(m).forEach(k=> m[k]=m[k].s/m[k].c);
  return m;
}

function topN(obj,n){
  return Object.fromEntries(
    Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n)
  );
}

// DESTROY
function destroy(id){
  if(charts[id]) charts[id].destroy();
}

// BAR
function drawBar(id,obj,horizontal=false,title=""){
  destroy(id);
  const sorted = Object.entries(obj).sort((a,b)=>b[1]-a[1]);

  charts[id]=new Chart(document.getElementById(id),{
    type:"bar",
    data:{
      labels:sorted.map(x=>x[0]),
      datasets:[{
        data:sorted.map(x=>x[1]),
        backgroundColor:"#2563eb",
        borderRadius:6
      }]
    },
    options:{
      indexAxis: horizontal?'y':'x',
      plugins:{
        legend:{display:false},
        title:{display:true,text:title},
        datalabels:{
          color:"#111",
          anchor:"end",
          align:"top",
          formatter:(v)=> v>0 ? v.toFixed(0):""
        }
      },
      scales:{
        x:{ticks:{maxRotation:45,minRotation:30}},
        y:{}
      }
    }
  });
}

// PIE
function drawPie(id,obj,title=""){
  destroy(id);
  const total = Object.values(obj).reduce((a,b)=>a+b,0);

  charts[id]=new Chart(document.getElementById(id),{
    type:"doughnut",
    data:{
      labels:Object.keys(obj),
      datasets:[{
        data:Object.values(obj),
        backgroundColor:["#22c55e","#ef4444","#f59e0b","#3b82f6"]
      }]
    },
    options:{
      plugins:{
        title:{display:true,text:title},
        datalabels:{
          color:"#111",
          formatter:(v)=>{
            const pct=(v/total)*100;
            return pct>5 ? pct.toFixed(1)+"%" : "";
          }
        }
      }
    }
  });
}

// SCATTER
function drawScatter(id,d){
  destroy(id);

  charts[id]=new Chart(document.getElementById(id),{
    type:"scatter",
    data:{
      datasets:[{
        label:"Income vs Hospitalization",
        data:d.map(x=>({x:x.Income,y:x.Hosp})),
        backgroundColor:"#22c55e"
      }]
    },
    options:{
      plugins:{
        title:{display:true,text:"Income vs Hospitalization"}
      },
      scales:{
        x:{title:{display:true,text:"Income"}},
        y:{title:{display:true,text:"Hospitalization"}}
      }
    }
  });
}
</script>

</body>
</html>
