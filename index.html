<!DOCTYPE html>
<html>
<head>
  <title>Adherence Dashboard</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .filters {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    select {
      padding: 8px;
      border-radius: 5px;
    }

    .kpi-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }

    .kpi {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Adherence & Treatment Dashboard</h1>

<!-- Filters -->
<div class="filters">
  <select id="diseaseFilter">
    <option value="All">All Diseases</option>
  </select>

  <select id="genderFilter">
    <option value="All">All Genders</option>
  </select>
</div>

<!-- KPI Cards -->
<div class="kpi-container">
  <div class="kpi">
    <h3>Total Records</h3>
    <p id="totalRecords">0</p>
  </div>

  <div class="kpi">
    <h3>Adherence %</h3>
    <p id="adherenceRate">0%</p>
  </div>

  <div class="kpi">
    <h3>Avg Dose Delay</h3>
    <p id="avgDelay">0</p>
  </div>
</div>

<!-- Charts -->
<div class="container">
  <div class="card">
    <h3>Adherence by Disease</h3>
    <canvas id="diseaseChart"></canvas>
  </div>

  <div class="card">
    <h3>Therapeutic Area vs Trial Length</h3>
    <canvas id="trialChart"></canvas>
  </div>

  <div class="card">
    <h3>Income vs Hospitalization</h3>
    <canvas id="incomeChart"></canvas>
  </div>

  <div class="card">
    <h3>Gender Distribution</h3>
    <canvas id="genderChart"></canvas>
  </div>
</div>

<script>
let rawData = [];
let diseaseChart, trialChart, incomeChart, genderChart;

// Load CSV
Papa.parse("Data_Adherence_.csv", {
  download: true,
  header: true,
  complete: function(results) {
    rawData = results.data;
    initFilters();
    updateDashboard();
  }
});

// Initialize filters
function initFilters() {
  const diseases = [...new Set(rawData.map(d => d.Disease))];
  const genders = [...new Set(rawData.map(d => d.Gender))];

  const diseaseFilter = document.getElementById("diseaseFilter");
  const genderFilter = document.getElementById("genderFilter");

  diseases.forEach(d => {
    let opt = document.createElement("option");
    opt.value = d;
    opt.text = d;
    diseaseFilter.appendChild(opt);
  });

  genders.forEach(g => {
    let opt = document.createElement("option");
    opt.value = g;
    opt.text = g;
    genderFilter.appendChild(opt);
  });

  diseaseFilter.onchange = updateDashboard;
  genderFilter.onchange = updateDashboard;
}

// Filter data
function getFilteredData() {
  const disease = document.getElementById("diseaseFilter").value;
  const gender = document.getElementById("genderFilter").value;

  return rawData.filter(d =>
    (disease === "All" || d.Disease === disease) &&
    (gender === "All" || d.Gender === gender)
  );
}

// Update dashboard
function updateDashboard() {
  const data = getFilteredData();

  // KPI
  document.getElementById("totalRecords").innerText = data.length;

  const adherent = data.filter(d => d.Adherence === "Adherent").length;
  document.getElementById("adherenceRate").innerText =
    ((adherent / data.length) * 100).toFixed(1) + "%";

  const avgDelay =
    data.reduce((sum, d) => sum + parseFloat(d.DoseDelayHours || 0), 0) / data.length;
  document.getElementById("avgDelay").innerText = avgDelay.toFixed(2);

  // Charts
  renderDiseaseChart(data);
  renderTrialChart(data);
  renderIncomeChart(data);
  renderGenderChart(data);
}

// Charts
function renderDiseaseChart(data) {
  const grouped = {};

  data.forEach(d => {
    grouped[d.Disease] = (grouped[d.Disease] || 0) + 1;
  });

  if (diseaseChart) diseaseChart.destroy();

  diseaseChart = new Chart(document.getElementById("diseaseChart"), {
    type: "bar",
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: "Count",
        data: Object.values(grouped)
      }]
    }
  });
}

function renderTrialChart(data) {
  const grouped = {};

  data.forEach(d => {
    const key = d.TherapeuticArea;
    grouped[key] = grouped[key] || { sum: 0, count: 0 };
    grouped[key].sum += parseFloat(d.TrialLengthWeeks || 0);
    grouped[key].count++;
  });

  const labels = Object.keys(grouped);
  const values = labels.map(k => grouped[k].sum / grouped[k].count);

  if (trialChart) trialChart.destroy();

  trialChart = new Chart(document.getElementById("trialChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Avg Trial Length",
        data: values
      }]
    }
  });
}

function renderIncomeChart(data) {
  const points = data.map(d => ({
    x: parseFloat(d.MedianIncome || 0),
    y: parseFloat(d.HospitalizationRisk || 0)
  }));

  if (incomeChart) incomeChart.destroy();

  incomeChart = new Chart(document.getElementById("incomeChart"), {
    type: "scatter",
    data: {
      datasets: [{
        label: "Income vs Hospitalization",
        data: points
      }]
    }
  });
}

function renderGenderChart(data) {
  const grouped = {};

  data.forEach(d => {
    grouped[d.Gender] = (grouped[d.Gender] || 0) + 1;
  });

  if (genderChart) genderChart.destroy();

  genderChart = new Chart(document.getElementById("genderChart"), {
    type: "pie",
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        data: Object.values(grouped)
      }]
    }
  });
}

</script>

</body>
</html>
